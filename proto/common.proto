syntax = "proto3";

package quantcore.common.v1;

message Empty {}

message ErrorDetail {
  int32 code = 1;
  string message = 2;
  string domain = 3;
  map<string, string> metadata = 4;
}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total_count = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
}

message TimeInterval {
  int64 start_ns = 1;
  int64 end_ns = 2;
}

message Money {
  double amount = 1;
  string currency = 2;
}

message Symbol {
  string code = 1;
  string exchange = 2;
  string market = 3;
}
