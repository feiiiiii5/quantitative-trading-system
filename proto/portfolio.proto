syntax = "proto3";

package quantcore.portfolio.v1;

service PortfolioService {
  rpc GetPortfolio(PortfolioRequest) returns (PortfolioResponse);
  rpc GetPositions(PositionsRequest) returns (PositionsResponse);
  rpc GetPnL(PnLRequest) returns (PnLResponse);
  rpc StreamPortfolioUpdates(PortfolioStreamRequest) returns (stream PortfolioUpdate);
}

message PortfolioRequest {
  string account_id = 1;
}

message PortfolioResponse {
  string account_id = 1;
  double total_value = 2;
  double cash = 3;
  double market_value = 4;
  double unrealized_pnl = 5;
  double realized_pnl = 6;
  double total_return_pct = 7;
  double daily_return_pct = 8;
  int64 timestamp_ns = 9;
}

message PositionsRequest {
  string account_id = 1;
  repeated string symbols = 2;
}

message PositionsResponse {
  repeated Position positions = 1;
}

message Position {
  string symbol = 1;
  int64 quantity = 2;
  double avg_cost = 3;
  double current_price = 4;
  double market_value = 5;
  double unrealized_pnl = 6;
  double unrealized_pnl_pct = 7;
  double weight_pct = 8;
  int64 timestamp_ns = 9;
}

message PnLRequest {
  string account_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message PnLResponse {
  double total_pnl = 1;
  double realized_pnl = 2;
  double unrealized_pnl = 3;
  double commission_cost = 4;
  double slippage_cost = 5;
  repeated DailyPnL daily_breakdown = 6;
}

message DailyPnL {
  string date = 1;
  double pnl = 2;
  double cumulative_pnl = 3;
  double drawdown = 4;
}

message PortfolioStreamRequest {
  string account_id = 1;
  int32 interval_ms = 2;
}

message PortfolioUpdate {
  string account_id = 1;
  double total_value = 2;
  double unrealized_pnl = 3;
  double daily_return_pct = 4;
  int64 timestamp_ns = 5;
  string event_type = 6;
}
