apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: quantcore
    service: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      service: api-gateway
  template:
    metadata:
      labels:
        app: quantcore
        service: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: quantcore/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: MARKET_DATA_ADDR
              value: "market-data:50051"
            - name: ORDER_ENGINE_ADDR
              value: "order-engine:50052"
            - name: RISK_ENGINE_ADDR
              value: "risk-engine:50053"
            - name: STRATEGY_ENGINE_ADDR
              value: "strategy-engine:50054"
            - name: PORTFOLIO_ENGINE_ADDR
              value: "portfolio-engine:50055"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: GIN_MODE
              value: "release"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    service: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
