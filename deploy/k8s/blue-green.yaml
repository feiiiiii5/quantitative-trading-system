apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-blue
  labels:
    app: quantcore
    service: api-gateway
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      service: api-gateway
      slot: blue
  template:
    metadata:
      labels:
        app: quantcore
        service: api-gateway
        slot: blue
    spec:
      containers:
        - name: api-gateway
          image: quantcore/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: MARKET_DATA_ADDR
              value: "market-data:50051"
            - name: ORDER_ENGINE_ADDR
              value: "order-engine:50052"
            - name: RISK_ENGINE_ADDR
              value: "risk-engine:50053"
            - name: STRATEGY_ENGINE_ADDR
              value: "strategy-engine:50054"
            - name: PORTFOLIO_ENGINE_ADDR
              value: "portfolio-engine:50055"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-green
  labels:
    app: quantcore
    service: api-gateway
    slot: green
spec:
  replicas: 0
  selector:
    matchLabels:
      service: api-gateway
      slot: green
  template:
    metadata:
      labels:
        app: quantcore
        service: api-gateway
        slot: green
    spec:
      containers:
        - name: api-gateway
          image: quantcore/api-gateway:canary
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: MARKET_DATA_ADDR
              value: "market-data:50051"
            - name: ORDER_ENGINE_ADDR
              value: "order-engine:50052"
            - name: RISK_ENGINE_ADDR
              value: "risk-engine:50053"
            - name: STRATEGY_ENGINE_ADDR
              value: "strategy-engine:50054"
            - name: PORTFOLIO_ENGINE_ADDR
              value: "portfolio-engine:50055"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    service: api-gateway
    slot: blue
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
