global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "market-data"
    static_configs:
      - targets: ["market-data:50051"]

  - job_name: "strategy-engine"
    static_configs:
      - targets: ["strategy-engine:8000"]

  - job_name: "backtest-engine"
    static_configs:
      - targets: ["backtest-engine:50056"]

  - job_name: "ai-engine"
    static_configs:
      - targets: ["ai-engine:50057"]

  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse:9363"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"
